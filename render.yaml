services:
  # ─── BACKEND SERVICE (Node.js/Express) ───
  - type: web
    name: collixa-backend
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://collixa.space
      - key: SUPABASE_URL
      - key: SUPABASE_ANON_KEY
      - key: SUPABASE_SERVICE_ROLE_KEY
      - key: GEMINI_API_KEY

  # ─── FRONTEND SERVICE (Next.js) ───
  - type: web
    name: collixa-frontend
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    rootDir: frontend
    envVars:
      - key: NODE_ENV
        value: production
    # Use sync to make sure the build has access to these keys
    # Note: For Next.js client-side variables, we need them at build time
      - key: NEXT_PUBLIC_API_URL
        value: https://api.collixa.space
      - key: NEXT_PUBLIC_SUPABASE_URL
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
