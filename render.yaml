envVarGroups:
  - name: collixa-secrets
    envVars:
      - key: SUPABASE_URL
      - key: SUPABASE_ANON_KEY
      - key: SUPABASE_SERVICE_ROLE_KEY
      - key: GEMINI_API_KEY
      - key: NEXT_PUBLIC_SUPABASE_URL
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY

services:
  # ─── BACKEND SERVICE (Node.js/Express) ───
  - type: web
    name: collixa-backend
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    rootDir: backend
    envVars:
      - fromGroup: collixa-secrets
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://collixa.space

  # ─── FRONTEND SERVICE (Next.js) ───
  - type: web
    name: collixa-frontend
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    rootDir: frontend
    envVars:
      - fromGroup: collixa-secrets
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://api.collixa.space
